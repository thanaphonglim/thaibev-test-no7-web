<mat-dialog-content>
    {{ data.message }}
</mat-dialog-content>
<div class="mt-4">
    <mat-dialog-actions align="end">
        <div>
            <button class="btn btn-primary btn-sm action-btn" (click)="confirm()">ลบ</button>
            <button class="btn btn-danger btn-sm mx-1 action-btn" (click)="cancel()">ยกเลิก</button>
        </div>
    </mat-dialog-actions>
</div>
